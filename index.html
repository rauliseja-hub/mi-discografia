<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Discografía" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Mi Discografía</title>
</head>
<body>
  <header class="topbar">
    <div><span class="eyebrow">COLECCIÓN PERSONAL</span><h1>Mi Discografía</h1></div>
    <button id="installBtn" class="ghost hidden">Instalar</button>
  </header>

  <main>
    <section class="hero">
      <p id="countText">Tu colección está vacía</p>
      <button id="scanBtn" class="primary">⌁ Escanear código</button>
      <button id="manualBtn" class="secondary">Introducir código</button>
    </section>

    <section id="scannerPanel" class="panel hidden">
      <div class="panel-head"><h2>Escanear</h2><button id="closeScanner" class="icon">×</button></div>
      <p>Coloca el código de barras dentro del recuadro y mantén el iPhone quieto.</p>
      <div id="reader"></div>
    </section>

    <section id="statusPanel" class="panel hidden" aria-live="polite">
      <div id="statusText">Buscando…</div>
    </section>

    <section id="formPanel" class="panel hidden">
      <div class="panel-head"><h2>Ficha del disco</h2><button id="closeForm" class="icon">×</button></div>
      <form id="recordForm">
        <input type="hidden" id="editId" />
        <label>Código de barras<input id="barcode" inputmode="numeric" required /></label>
        <label>Artista<input id="artist" required /></label>
        <label>Título<input id="title" required /></label>
        <div class="grid2">
          <label>Año<input id="year" inputmode="numeric" /></label>
          <label>Formato<input id="format" placeholder="Vinilo, CD…" /></label>
        </div>
        <label>Sello<input id="label" /></label>
        <label>URL de portada<input id="cover" type="url" /></label>
        <button class="primary" type="submit">Guardar en mi colección</button>
      </form>
    </section>

    <section class="collection">
      <div class="section-head"><h2>Mis discos</h2><input id="search" type="search" placeholder="Buscar artista o título" /></div>
      <div id="records" class="records"></div>
    </section>
  </main>

  <template id="recordTemplate">
    <article class="record-card">
      <img class="record-cover" alt="" />
      <div class="record-info"><span class="record-format"></span><h3 class="record-title"></h3><p class="record-artist"></p><small class="record-meta"></small></div>
      <button class="record-menu" aria-label="Editar">•••</button>
    </article>
  </template>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
